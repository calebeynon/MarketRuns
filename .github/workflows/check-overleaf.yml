name: Check Overleaf for edits

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Overleaf repo
        env:
          OVERLEAF_GIT_TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
        run: |
          git clone https://git:${OVERLEAF_GIT_TOKEN}@git.overleaf.com/683a03b245fd46af8b04ebd2 /tmp/overleaf

      - name: Detect human commits since last sync
        id: detect
        run: |
          cd /tmp/overleaf

          # Find the most recent commit by GitHub Actions (our last sync)
          last_sync=$(git log --all --author="GitHub Actions" --format="%H" -1 || true)

          if [ -z "$last_sync" ]; then
            echo "No prior sync commit found — treating all commits as human edits"
            human_hashes=$(git log --format="%H" --all)
          else
            # Commits after last sync that are NOT by GitHub Actions
            human_hashes=$(git log --format="%aN	%H" "${last_sync}..HEAD" \
              | grep -v "^GitHub Actions	" \
              | cut -f2 || true)
          fi

          # Filter out empty commits (Overleaf autosaves with no actual changes)
          human_commits=""
          for hash in $human_hashes; do
            if [ -n "$(git diff-tree --no-commit-id -r "$hash")" ]; then
              human_commits="${human_commits}$(git log --format="%h %s (%an, %ai)" -1 "$hash")"$'\n'
            fi
          done
          human_commits=$(echo "$human_commits" | sed '/^$/d')

          if [ -z "$human_commits" ]; then
            echo "No unmerged Overleaf edits detected"
            echo "has_edits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Human commits exist — check if they've already been merged
          # Compares lines added by human edits against our repo version
          already_merged=true
          if [ -n "$last_sync" ]; then
            human_files=""
            for hash in $human_hashes; do
              human_files="${human_files} $(git diff-tree --no-commit-id -r --name-only "$hash" 2>/dev/null)"
            done
            human_files=$(echo "$human_files" | tr ' ' '\n' | sort -u | sed '/^$/d')

            for file in $human_files; do
              repo_file="${GITHUB_WORKSPACE}/analysis/paper/${file}"
              if [ ! -f "$file" ]; then
                continue
              fi
              if [ ! -f "$repo_file" ]; then
                already_merged=false
                echo "Unmerged file only on Overleaf: $file"
                break
              fi
              git show "${last_sync}:${file}" > /tmp/guard_base 2>/dev/null || continue
              human_additions=$(diff /tmp/guard_base "$file" | grep '^> ' | sed 's/^> //' || true)

              while IFS= read -r line; do
                trimmed=$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
                [ -z "$trimmed" ] && continue
                if ! grep -qF "$trimmed" "$repo_file"; then
                  already_merged=false
                  echo "Unmerged addition in $file: $trimmed"
                  break 2
                fi
              done <<< "$human_additions"
            done
          else
            already_merged=false
          fi

          if [ "$already_merged" = "true" ]; then
            echo "Human edits already present in repo — no issue needed"
            echo "has_edits=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Overleaf has unmerged human edits"
            echo "$human_commits"
            echo "has_edits=true" >> "$GITHUB_OUTPUT"
            {
              echo "commits<<EOF"
              echo "$human_commits"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for unmerged Overleaf edits
        if: steps.detect.outputs.has_edits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ steps.detect.outputs.commits }}
        run: |
          existing=$(gh issue list --label "overleaf-sync" --state open --json number --jq '.[0].number' -R "${{ github.repository }}" || true)

          if [ -n "$existing" ]; then
            echo "Open issue #${existing} already exists — skipping creation"
            exit 0
          fi

          cat > /tmp/issue_body.md <<'EOF'
          ## Overleaf has unmerged edits

          The scheduled check detected human commits on Overleaf that have not been merged into this repo. Future syncs will be **blocked** until these edits are merged.

          ### Commits on Overleaf since last sync

          ```
          EOF
          echo "$COMMITS" >> /tmp/issue_body.md
          cat >> /tmp/issue_body.md <<'EOF'
          ```

          ### How to merge

          ```bash
          git fetch overleaf master
          git subtree pull --prefix=analysis/paper overleaf master --squash
          rm -rf analysis/paper/tables analysis/paper/plots  # Action-managed dirs
          git push origin main
          ```

          After merging, close this issue. The next push to `main` will sync normally.

          > To force-sync without merging, run the sync workflow manually with **force = true**.
          EOF

          gh issue create \
            --title "Overleaf has unmerged edits — sync blocked" \
            --body-file /tmp/issue_body.md \
            --label "overleaf-sync" \
            -R "${{ github.repository }}"
